name: integration

# Real-model integration suite. Downloads ~560 MB of ONNX weights from
# the Hugging Face Hub on first run, then caches them. NOT a PR gate;
# runs on demand and on a weekly schedule so we catch upstream drift.

on:
  workflow_dispatch:
  schedule:
    # Mondays 07:00 UTC
    - cron: "0 7 * * 1"

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Cache Hugging Face model
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-atjsh-llmlingua-2-js-xlm-roberta-large-meetingbank
      - run: npm ci
      - run: npm run test:integration
        env:
          LLMLINGUA_INTEGRATION: "1"
